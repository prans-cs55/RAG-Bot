<!DOCTYPE html>
<html>
<head>
    <title>RAG PDF Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>RAG PDF Chatbot</h1>

    <input type="file" id="pdfs" multiple>
    <button onclick="uploadPDFs()">Upload PDFs</button>

    <div id="chat"></div>

    <input type="text" id="message" placeholder="Ask a question">
    <button onclick="sendMessage()">Send</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
